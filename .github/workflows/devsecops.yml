
name: Complete DevSecOps Pipeline - RAG Platform

"on":
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  devsecops:
    runs-on: ubuntu-latest

    steps:

      # ==========================================
      # 1. Récupération du code
      # ==========================================
      - name: Checkout source code
        uses: actions/checkout@v4

      # ==========================================
      # 2. Installation Java
      # ==========================================
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      # ==========================================
      # 3. Compilation
      # ==========================================
      - name: Maven Build
        run: mvn clean compile

      # ==========================================
      # 4. Tests unitaires
      # ==========================================
      - name: Run Unit Tests
        run: mvn test -DskipTests

      # ==========================================
      # 5. Packaging
      # ==========================================
      - name: Package Application
        run: mvn package -DskipTests

      # ==========================================
      # 6. Analyse SAST CodeQL
      # ==========================================
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java

      - name: Build for CodeQL
        run: mvn clean compile

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

      # ==========================================
      # 7. Détection de secrets
      # ==========================================
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2

      # ==========================================
      # 8. Scan des dépendances
      # ==========================================
      - name: OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: "RAG-Platform"
          path: "."
          format: "HTML"

      - name: Upload Dependency Report
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: reports/

      # ==========================================
      # 9. Construction Docker
      # ==========================================
      - name: Build Docker Image
        run: |
          docker build -t rag-platform:latest .

      # ==========================================
      # 10. Scan de vulnérabilités Docker
      # ==========================================
      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: rag-platform:latest
          format: sarif
          output: trivy-results.sarif

      - name: Upload Trivy Results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

      # ==========================================
      # 11. Sauvegarde des rapports
      # ==========================================
      - name: Upload Security Reports
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            trivy-results.sarif
            reports/

